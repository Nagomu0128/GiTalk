steps:
  # Step 0: Lint
  - name: "node:20"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        npm install -g pnpm && \
        pnpm install --frozen-lockfile && \
        pnpm lint
    dir: "backend"

  # Step 1: Docker build
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_ARTIFACT_REGISTRY_URL}/${_IMAGE_NAME}:${COMMIT_SHA}"
      - "-t"
      - "${_ARTIFACT_REGISTRY_URL}/${_IMAGE_NAME}:latest"
      - "-f"
      - "backend/Dockerfile"
      - "backend"

  # Step 2: Docker push
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_ARTIFACT_REGISTRY_URL}/${_IMAGE_NAME}"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_CLOUD_RUN_SERVICE}"
      - "--image"
      - "${_ARTIFACT_REGISTRY_URL}/${_IMAGE_NAME}:${COMMIT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--add-cloudsql-instances"
      - "${_CLOUDSQL_INSTANCE}"

options:
  default_logs_bucket_behavior: REGIONAL_USER_OWNED_BUCKET

substitutions:
  _ARTIFACT_REGISTRY_URL: ""
  _IMAGE_NAME: ""
  _CLOUD_RUN_SERVICE: ""
  _REGION: ""
  _CLOUDSQL_INSTANCE: ""
